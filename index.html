<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Currency to MMK Converter (Live API)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #333; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { margin-bottom: 1.5rem; color: #4834d4; }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #666; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 2px solid #edeff2; border-radius: 10px; font-size: 16px; outline: none; box-sizing: border-box; }
        select:focus, input:focus { border-color: #667eea; }
        .result-area { background: #f8f9fa; padding: 1.5rem; border-radius: 12px; margin-top: 1rem; border-left: 5px solid #2ecc71; }
        #mmkResult { font-size: 22px; font-weight: bold; color: #27ae60; display: block; margin-top: 5px; }
        .status { font-size: 0.75rem; color: #95a5a6; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Currency to MMK</h2>
    
    <div class="input-group">
        <label>ငွေကြေးအမျိုးအစား ရွေးပါ</label>
        <select id="currencyType" onchange="convert()">
            <option value="THB">Thai Baht (THB)</option>
            <option value="USD">US Dollar (USD)</option>
            <option value="SGD">Singapore Dollar (SGD)</option>
            <option value="MYR">Malaysian Ringgit (MYR)</option>
        </select>
    </div>

    <div class="input-group">
        <label>ပမာဏရိုက်ထည့်ပါ</label>
        <input type="number" id="amountInput" placeholder="Enter amount" oninput="convert()">
    </div>

    <div class="result-area">
        <label>ရရှိမည့် မြန်မာကျပ်ငွေ</label>
        <span id="mmkResult">0 MMK</span>
    </div>

    <p class="status">Live Rate: <span id="currentRate">Loading...</span></p>
    <p class="status" style="font-size: 10px;">Powered by ExchangeRate-API</p>
</div>

<script>
    // API ကနေ ငွေလဲနှုန်း အမှန်ကို ယူပေးမယ့် function
    async function convert() {
        const amount = document.getElementById('amountInput').value;
        const currency = document.getElementById('currencyType').value;
        const resultDisplay = document.getElementById('mmkResult');
        const rateDisplay = document.getElementById('currentRate');

        if (!amount || amount <= 0) {
            resultDisplay.innerText = "0 MMK";
            return;
        }

        try {
            // အခမဲ့ API link ဖြစ်ပါတယ်
            const response = await fetch(`https://open.er-api.com/v6/latest/${currency}`);
            const data = await response.json();
            
            // မြန်မာကျပ်ငွေ (MMK) နှုန်းကို ယူခြင်း
            const mmkRate = data.rates.MMK;
            const total = amount * mmkRate;

            rateDisplay.innerText = `1 ${currency} = ${mmkRate.toFixed(2)} MMK`;
            resultDisplay.innerText = total.toLocaleString(undefined, {maximumFractionDigits: 2}) + " MMK";
            
        } catch (error) {
            rateDisplay.innerText = "Error fetching rate!";
            console.error(error);
        }
    }

    // စစချင်းမှာ တစ်ခါ run ပေးဖို့
    convert();
</script>

</body>
</html>
